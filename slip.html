<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Krishna Sudha Enterprises - Slip</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary-border: #333; }
        body { font-family: 'Courier New', Courier, monospace; background-color: #f4f4f4; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #1a1a1a; }
        .slip-container { background-color: white; width: 420px; padding: 25px; border: 1px solid #ddd; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 20px; }
        .header h2 { margin: 0; font-size: 20px; text-transform: uppercase; }
        .header p { margin: 4px 0; font-size: 13px; font-weight: 600; }
        .info-section { margin-bottom: 20px; font-size: 14px; line-height: 1.6; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 13px; }
        th, td { border-bottom: 1px dashed #ccc; padding: 8px 4px; text-align: left; }
        th { font-weight: bold; border-bottom: 2px solid #000; }
        [contenteditable="true"] { outline: none; padding: 2px; display: inline-block; width: 90%; }
        [contenteditable="true"]:focus { background-color: #f0f7ff; border-bottom: 1px solid #0066cc; }
        .add-btn { background-color: #f8fafc; border: 1px dashed #94a3b8; color: #475569; padding: 8px; cursor: pointer; width: 100%; margin-bottom: 20px; font-family: inherit; }
        .add-btn:hover { background-color: #e2e8f0; }
        .delete-btn { color: #dc2626; border: none; background: none; cursor: pointer; font-size: 14px; padding: 0 5px; }
        .qr-section { text-align: center; margin: 20px 0; }
        #qrcode { display: flex; justify-content: center; margin-top: 10px; }
        .footer { margin-top: 40px; display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; }
        .print-btn { margin-top: 25px; padding: 12px 30px; background-color: #000; color: #fff; border: none; cursor: pointer; font-size: 16px; font-weight: bold; }
        @media print {
            body { background-color: white; padding: 0; }
            .slip-container { box-shadow: none; border: none; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="slip-container">
        <div class="header">
            <h2>NEW KRISHNA SUDHA ENTERPRISES</h2>
            <p>Prop.: Malay Hens & Suman Hens</p>
            <p>Fului, Badanganj, Hooghly</p>
        </div>

        <div class="info-section">
            <p><strong>Date:</strong> <span id="currentDate"></span></p>
            <p><strong>Slip No:</strong> <span id="slipNo" contenteditable="true">101</span></p>
            <p><strong>Name:</strong> <span id="custName" contenteditable="true">Enter Name</span></p>
            <p><strong>Phone:</strong> <span id="custPhone" contenteditable="true">Enter Phone</span></p>
        </div>

        <table id="itemsTable">
            <thead>
                <tr>
                    <th style="width: 8%;">#</th>
                    <th style="width: 45%;">Item Name</th>
                    <th style="width: 25%;">Qty</th>
                    <th style="width: 22%;">Rate</th>
                    <th style="width: 5%;" class="no-print"></th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="row-number">1</td>
                    <td contenteditable="true">Cement</td>
                    <td contenteditable="true">20 Bags</td>
                    <td contenteditable="true">-</td>
                    <td class="no-print"><button class="delete-btn" onclick="deleteRow(this)">✕</button></td>
                </tr>
            </tbody>
        </table>
        
        <button class="add-btn no-print" onclick="addRow()">+ Add New Item</button>

        <div class="qr-section">
            <div id="qrcode"></div>
        </div>

        <div class="footer">
            <span>Customer Sign</span>
            <span>Seller Sign</span>
        </div>
    </div>

    <button class="print-btn no-print" onclick="window.print()">🖨️ Print Delivery Slip</button>

    <script>
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-IN');

        function updateRowNumbers() {
            document.querySelectorAll('#itemsTable tbody tr').forEach((row, index) => {
                row.querySelector('.row-number').textContent = index + 1;
            });
        }

        function addRow() {
            const tbody = document.querySelector('#itemsTable tbody');
            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td class="row-number"></td>
                <td contenteditable="true"></td>
                <td contenteditable="true"></td>
                <td contenteditable="true"></td>
                <td class="no-print"><button class="delete-btn" onclick="deleteRow(this)">✕</button></td>
            `;
            tbody.appendChild(newRow);
            updateRowNumbers();
        }

        function deleteRow(btn) {
            btn.closest('tr').remove();
            updateRowNumbers();
        }

        function generateRecordQR() {
            const data = `Slip: ${document.getElementById('slipNo').innerText} | ${document.getElementById('custName').innerText}`;
            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: data, width: 100, height: 100 });
        }

        // Auto-refresh QR on blur of editable fields
        document.querySelectorAll('[contenteditable="true"]').forEach(el => {
            el.addEventListener('blur', generateRecordQR);
        });

        updateRowNumbers();
        generateRecordQR();
    </script>
</body>
  </html>
